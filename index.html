<!DOCTYPE html>
<html>
<head>
    <title>AI Sentiment Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🤖 AI Sentiment Analyzer</h1>

    <form method="POST">
        <textarea
            name="text"
            placeholder="Enter your review or sentence..."
            required></textarea>

        <button type="submit">Analyze</button>
        <br><br>

<a href="/history">
    <button type="button">View Analysis History</button>
</a>
    </form>

    {% if result %}
    <div class="result">
        <h2>Result</h2>

        <p><strong>Text:</strong> {{ result.text }}</p>
        <p><strong>Sentiment:</strong> {{ result.label }}</p>
        <p><strong>Confidence:</strong> {{ result.score }}%</p>
    </div>
    {% endif %}

</div>

</body>
</html>
